spring.application.name=backend

# Server Port Configuration
server.port=8080

# AI Services
gemini.api.key=${GEMINI_API_KEY}
youtube.api.key=${YOUTUBE_API_KEY}

# MongoDB Datastore Connection Configuration
# Replaced localhost with a URI variable for MongoDB Atlas
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=career_copilot_db

# Redis High-Speed Cache Connection Configuration
# Replaced localhost with variables for a cloud Redis provider
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# Official Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.data.redis.ssl.enabled=true

resend.api.key=${RESEND_API_KEY}